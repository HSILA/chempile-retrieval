<html><head><meta charset="utf-8"/>

<title>Centroid triangle</title></head><body>
<h2>Centroid triangle (illustrative)</h2>
<p>This visual places the three dataset centroids (ChemRxiv corpus, Chempile A3 corpus, anchors_general corpus) into 3D via PCA over the three centroid vectors (per model). It is an intuition aid, not a statistical test.</p>
<h3>ChEmbed-vanilla</h3>
<div id="plot_0" style="width:900px;height:600px;"></div>
<script>
var tracePts = {type:'scatter3d', mode:'markers+text', x:[-0.46666327118873596, -0.12091998010873795, 0.5875831842422485], y:[0.33814966678619385, -0.5031636953353882, 0.16501404345035553], z:[3.571122064727206e-08, 3.571122064727206e-08, 3.571122064727206e-08], text:['chemrxiv', 'chempile', 'anchors_general'], textposition:'top center', marker:{size:6}};
var traceTri = {type:'scatter3d', mode:'lines', x:[-0.46666327118873596, -0.12091998010873795, 0.5875831842422485, -0.46666327118873596], y:[0.33814966678619385, -0.5031636953353882, 0.16501404345035553, 0.33814966678619385], z:[3.571122064727206e-08, 3.571122064727206e-08, 3.571122064727206e-08, 3.571122064727206e-08], line:{width:4}};
Plotly.newPlot('plot_0', [traceTri, tracePts], {margin:{l:0,r:0,b:0,t:30}, title:'ChEmbed-vanilla'});
</script>
